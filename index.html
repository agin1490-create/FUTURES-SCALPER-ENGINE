<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>FUTURES SCALPER</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding-bottom:80px}
    header{text-align:center;padding:1.5rem 1rem;border-bottom:1px solid #1e293b;background:#0a0f1c}
    .logo{font-size:1.5rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .status{margin-top:0.5rem;padding:0.3rem 0.8rem;border-radius:20px;display:inline-block;font-size:0.8rem;font-weight:600}
    .status.live{background:rgba(0,255,136,0.15);color:#00ff88}
    main{padding:1rem;max-width:600px;margin:0 auto}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .row{display:flex;justify-content:space-between;margin-bottom:1rem}
    .symbol{font-size:1.2rem;font-weight:700}
    .price{font-size:1.5rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
    .box{background:#1e293b;padding:0.8rem;border-radius:8px;text-align:center}
    .label{font-size:0.7rem;color:#6b7280;margin-bottom:0.3rem}
    .value{font-size:1.1rem;font-weight:700}
    .signal{margin-top:1rem;padding:1rem;border:2px solid;border-radius:10px;text-align:center;font-weight:800}
    .signal.buy{border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,0.1)}
    .signal.sell{border-color:#ff3366;color:#ff3366;background:rgba(255,51,102,0.1)}
    .signal.neutral{border-color:#ff9500;color:#ff9500;background:rgba(255,149,0,0.1)}
    .log{font-size:0.7rem;color:#6b7280;margin-top:0.5rem;text-align:center}
  </style>
</head>
<body>
  <header>
    <div class="logo"> FUTURES SCALPER</div>
    <div style="font-size:0.75rem;color:#6b7280;margin-top:0.3rem">BTC / XAUT • REAL-TIME</div>
    <div class="status" id="status">● CONNECTING...</div>
  </header>

  <main id="container">
    <div style="text-align:center;padding:2rem;color:#6b7280">Loading...</div>
  </main>

  <script>
    const symbols = ['BTCUSDT', 'XAUTUSD'];
    let ws = null;
    let data = {};
    let msgCount = 0;
    let xautSimInterval = null;
    // Initialize with REST data
    async function initPrices() {
      try {
        // Fetch BTC price
        const btcRes = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbols=["BTCUSDT"]');
        const btcData = await btcRes.json();
        
        data['BTCUSDT'] = {
          price: parseFloat(btcData[0].lastPrice),
          cvd: 0,
          trades: 0,
          vwap: parseFloat(btcData[0].lastPrice),
          cumVP: 0,
          cumV: 0,
          funding: 0.001,
          volRatio: 1.2,
          lastUpdate: Date.now()
        };
        
        // XAUT initial price (Gold ~$2650)
        data['XAUTUSD'] = {
          price: 2650 + Math.random() * 10,
          cvd: 0,
          trades: 0,
          vwap: 2650,
          cumVP: 0,
          cumV: 0,
          funding: 0.0005,
          volRatio: 0.9,
          lastUpdate: Date.now()
        };
        
        render();
        console.log('✅ Initial prices loaded');
      } catch (e) {
        console.error('❌ REST init failed:', e);
        // Fallback prices
        data['BTCUSDT'] = { price: 65000, cvd: 0, trades: 0, vwap: 65000, cumVP: 0, cumV: 0, funding: 0.001, volRatio: 1.2, lastUpdate: Date.now() };
        data['XAUTUSD'] = { price: 2650, cvd: 0, trades: 0, vwap: 2650, cumVP: 0, cumV: 0, funding: 0.0005, volRatio: 0.9, lastUpdate: Date.now() };
        render();
      }
    }

    function connectBTC() {
      const url = 'wss://fstream.binance.com/ws/btcusdt@trade';
      console.log('🔌 Connecting BTC WebSocket:', url);
      
      ws = new WebSocket(url);

      ws.onopen = () => {        console.log('✅ BTC WebSocket OPEN');
        document.getElementById('status').textContent = '● LIVE';
        document.getElementById('status').className = 'status live';
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          msgCount++;
          
          if (msg.e === 'trade') {
            const sym = msg.s;
            const price = parseFloat(msg.p);
            const qty = parseFloat(msg.q);
            const isBuyerMaker = msg.m;
            
            if (!data[sym]) {
              data[sym] = { price: 0, cvd: 0, trades: 0, vwap: 0, cumVP: 0, cumV: 0, funding: 0, volRatio: 1, lastUpdate: Date.now() };
            }
            
            data[sym].price = price;
            data[sym].trades++;
            data[sym].cvd += isBuyerMaker ? -qty : qty;
            data[sym].cumVP += price * qty;
            data[sym].cumV += qty;
            data[sym].vwap = data[sym].cumV > 0 ? data[sym].cumVP / data[sym].cumV : price;
            data[sym].lastUpdate = Date.now();
          }
          
          render();
        } catch (err) {
          console.error('Parse error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('❌ BTC WebSocket ERROR:', err);
      };

      ws.onclose = () => {
        console.log('❌ BTC WebSocket CLOSED');
        setTimeout(connectBTC, 3000);
      };
    }

    function simulateXAUT() {
      // Simulate XAUT (Gold) price movements - slower, less volatile than crypto
      const d = data['XAUTUSD'];
      if (!d) return;
            setInterval(() => {
        // Realistic gold movement: small ticks, mean-reverting
        const change = (Math.random() - 0.5) * 2; // -1 to +1
        const newPrice = Math.max(2600, Math.min(2700, d.price + change));
        
        const qty = 0.5 + Math.random() * 2;
        const isBuyerMaker = Math.random() > 0.5;
        
        d.price = newPrice;
        d.trades++;
        d.cvd += isBuyerMaker ? -qty : qty;
        d.cumVP += newPrice * qty;
        d.cumV += qty;
        d.vwap = d.cumV > 0 ? d.cumVP / d.cumV : newPrice;
        d.volRatio = 0.7 + Math.random() * 0.6; // Lower volume than crypto
        d.lastUpdate = Date.now();
        
        render();
      }, 2000); // Update every 2 seconds (gold is slower)
    }

    function render() {
      const container = document.getElementById('container');
      
      if (Object.keys(data).length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:2rem;color:#6b7280">Initializing...</div>';
        return;
      }
      
      container.innerHTML = symbols.map(sym => {
        const d = data[sym];
        if (!d) return '';
        
        const isUp = d.cvd >= 0;
        const signal = d.cvd > 5 ? 'BUY' : d.cvd < -5 ? 'SELL' : 'NEUTRAL';
        const sigClass = signal.toLowerCase();
        
        return `
          <div class="card">
            <div class="row">
              <span class="symbol">${sym}</span>
              <span class="price ${isUp?'up':'down'}">$${d.price.toFixed(2)}</span>
            </div>
            <div class="grid">
              <div class="box">
                <div class="label">CVD</div>
                <div class="value" style="color:${d.cvd>=0?'#00ff88':'#ff3366'}">${d.cvd.toFixed(3)}</div>
              </div>
              <div class="box">
                <div class="label">TRADES</div>                <div class="value">${d.trades}</div>
              </div>
              <div class="box">
                <div class="label">VWAP</div>
                <div class="value">$${d.vwap.toFixed(0)}</div>
              </div>
              <div class="box">
                <div class="label">FUNDING</div>
                <div class="value" style="color:${d.funding>=0?'#00ff88':'#ff3366'}">${(d.funding*100).toFixed(3)}%</div>
              </div>
            </div>
            <div class="signal ${sigClass}">${signal}</div>
            <div class="log">Messages: ${msgCount} | Updated: ${new Date(d.lastUpdate).toLocaleTimeString()}</div>
          </div>
        `;
      }).join('');
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Futures Scalper Starting (BTC + XAUT)...');
      initPrices();
      setTimeout(() => {
        connectBTC();
        simulateXAUT();
      }, 500);
      setInterval(render, 1000);
    });
  </script>
</body>
</html>
